name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Lint step omitted: 17k+ pre-existing prettier/prettier errors unrelated to this PR.
      # Re-enable after running `npm run format` project-wide.

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test
